<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voyage — The Reputation Layer</title>
  <meta name="description" content="The ultimate campaign credentialing and digital reputation platform. Build your on-chain identity through ecosystem participation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ─── Page Reset ─────────────────────────────────── */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
    }

    /* ─── Background Override ────────────────────────── */
    body.page-index {
      background-image: url('asset/robo.png');
      background-size: cover;
      background-position: center top;
    }

    /* Lighter, warmer overlay so robo character shows clearly */
    body.page-index::before {
      background: linear-gradient(
        135deg,
        rgba(5, 4, 12, 0.82) 0%,
        rgba(10, 8, 20, 0.60) 50%,
        rgba(5, 4, 12, 0.40) 100%
      );
      backdrop-filter: blur(0px);
    }

    /* ─── Top-left header ────────────────────────────── */
    .landing-header {
      position: fixed;
      top: 52px;
      left: 60px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 520px;
    }

    /* Brand row: logo text + social icons */
    .brand-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .Voyage-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1;
      margin: 0;
      color: #ffffff;
      /* Subtle orange glow instead of hard shadow */
      text-shadow:
        0 0 40px rgba(217, 119, 87, 0.5),
        0 0 80px rgba(217, 119, 87, 0.2);
    }

    .Voyage-title span {
      color: var(--accent);
    }

    /* Thin horizontal rule under title */
    .title-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 70%);
      margin: 4px 0;
    }

    .tagline-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.65);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      line-height: 1.7;
      padding-left: 0;
      border-left: none;
      margin: 0;
    }

    /* ─── Social Icons ───────────────────────────────── */
    .social-icons {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 2px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: all 0.25s ease;
      background: rgba(255, 255, 255, 0.04);
    }

    .social-link:hover {
      color: #fff;
      border-color: var(--accent);
      background: rgba(217, 119, 87, 0.12);
      transform: translateY(-2px);
    }

    /* ─── Action Buttons (top-right) ─────────────────── */
    .action-group {
      position: fixed;
      top: 52px;
      right: 60px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
      z-index: 100;
    }

    .btn-launch {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 36px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 0 24px rgba(217, 119, 87, 0.35);
      min-width: 180px;
      text-align: center;
      display: inline-block;
    }

    .btn-launch:hover {
      background: #e8886a;
      box-shadow: 0 0 40px rgba(217, 119, 87, 0.55);
      transform: translateY(-2px);
      color: #fff;
      text-decoration: none;
    }

    .btn-contact {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 8px 24px;
      background: transparent;
      color: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s ease;
      min-width: 140px;
      text-align: center;
      display: inline-block;
    }

    .btn-contact:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
      text-decoration: none;
    }

    /* ─── Bottom-left stats strip ────────────────────── */
    .stats-strip {
      position: fixed;
      bottom: 108px;
      left: 60px;
      display: flex;
      gap: 40px;
      z-index: 10;
    }

    .stat-pill {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-pill-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .stat-pill-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.4);
    }

    .stat-divider {
      width: 1px;
      background: rgba(255, 255, 255, 0.12);
      align-self: stretch;
    }



    /* ─── Status monitor (bottom-right) ──────────────── */
    .status-monitor {
      position: fixed;
      bottom: 44px;
      right: 60px;
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: rgba(255, 255, 255, 0.28);
      z-index: 10;
      line-height: 1.9;
      letter-spacing: 0.06em;
    }

    .status-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Subtle corner decorations ──────────────────── */
    .corner-tl, .corner-br {
      position: fixed;
      width: 40px;
      height: 40px;
      z-index: 5;
      opacity: 0.3;
    }

    .corner-tl {
      top: 20px;
      left: 20px;
      border-top: 1px solid var(--accent);
      border-left: 1px solid var(--accent);
    }

    .corner-br {
      bottom: 20px;
      right: 20px;
      border-bottom: 1px solid var(--accent);
      border-right: 1px solid var(--accent);
    }

    /* ─── Responsive ──────────────────────────────────── */
    @media (max-width: 900px) {
      .landing-header {
        top: 32px;
        left: 24px;
        max-width: calc(100vw - 48px);
      }

      .action-group {
        top: auto;
        right: auto;
        bottom: 120px;
        left: 24px;
        align-items: flex-start;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .btn-launch, .btn-contact {
        min-width: auto;
        padding: 12px 24px;
        font-size: 0.8rem;
      }

      .stats-strip {
        display: none;
      }

      .status-monitor {
        display: none;
      }

      .Voyage-title {
        font-size: clamp(2.4rem, 10vw, 4rem);
      }

      .corner-tl, .corner-br {
        display: none;
      }
    }
  </style>
</head>
<body class="page-index">

  <!-- Decorative corners -->
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <!-- Top-left: Brand + Tagline -->
  <header class="landing-header">
    <div class="brand-row">
      <h1 class="Voyage-title">Voyage</h1>
      <div class="social-icons">
        <a href="#" class="social-link" aria-label="X / Twitter">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/>
          </svg>
        </a>
        <a href="#" class="social-link" aria-label="Discord">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">

          </svg>
        </a>
      </div>
    </div>
    <div class="title-rule"></div>
    <p class="tagline-text">
      Campaign credentialing &amp; digital reputation.<br>
      Build your on-chain identity.
    </p>
  </header>

  <!-- Top-right: CTA Buttons -->
  <aside class="action-group">
    <a href="dashboard.html" class="btn-launch" id="launch-app-btn">Launch App →</a>
    <a href="#" class="btn-contact" id="contact-btn">Get in Touch</a>
  </aside>

  <!-- Bottom-left: Live stats -->
  <div class="stats-strip">
    <div class="stat-pill">
      <span class="stat-pill-value">12.4K</span>
      <span class="stat-pill-label">Active Users</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill">
      <span class="stat-pill-value">$2.1M</span>
      <span class="stat-pill-label">Rewards Paid</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill">
      <span class="stat-pill-value">340+</span>
      <span class="stat-pill-label">Campaigns</span>
    </div>
  </div>

  <!-- Bottom center: Dock navigation -->
  <nav class="dock" role="navigation" aria-label="Main navigation">

    <!-- Dash — Blue dashboard panels -->
    <a href="dashboard.html" class="dock-item" id="dock-dash">
      <svg class="dock-icon-3d" viewBox="0 0 48 48" fill="none">

          <linearGradient id="dash-g1" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#93C5FD"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>

        </defs>
        <rect x="6" y="6" width="20" height="20" rx="6" fill="url(#dash-g1)" opacity="0.65"/>
        <rect x="22" y="22" width="20" height="20" rx="6" fill="url(#dash-g2)" opacity="0.9"/>
        <rect x="28" y="6" width="14" height="14" rx="5" fill="url(#dash-g1)" opacity="0.45"/>
        <rect x="6" y="28" width="14" height="14" rx="5" fill="url(#dash-g2)" opacity="0.45"/>
        <rect x="23" y="23" width="18" height="8" rx="4" fill="white" opacity="0.25"/>
      </svg>
      <span class="dock-label">Dash</span>
    </a>

    <!-- Explore — Campaign icon -->
    <a href="campaigns.html" class="dock-item" id="dock-explore">
      <img class="dock-icon-3d" src="asset/campaign.png" alt="Explore">
      <span class="dock-label">Campaign</span>
    </a>

    <!-- Tasks — Purple rounded card with checkmark -->
    <a href="tasks.html" class="dock-item" id="dock-tasks">
      <svg class="dock-icon-3d" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="tasks-g1" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
        </defs>
        <rect x="6" y="8" width="36" height="32" rx="10" fill="url(#tasks-g1)" opacity="0.8"/>
        <rect x="10" y="10" width="28" height="12" rx="6" fill="white" opacity="0.2"/>
        <polyline points="16,25 22,31 34,19" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
      </svg>
      <span class="dock-label">Tasks</span>
    </a>

    <!-- Rank — Blue-to-pink gradient bar chart -->
    <a href="leaderboard.html" class="dock-item" id="dock-rank">
      <svg class="dock-icon-3d" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="rank-g1" x1="0" y1="48" x2="0" y2="0"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient>
          <linearGradient id="rank-g2" x1="0" y1="48" x2="0" y2="0"><stop offset="0%" stop-color="#60A5FA"/><stop offset="100%" stop-color="#F472B6"/></linearGradient>
        </defs>
        <rect x="6" y="26" width="10" height="16" rx="4" fill="url(#rank-g2)" opacity="0.6"/>
        <rect x="19" y="12" width="10" height="30" rx="4" fill="url(#rank-g1)" opacity="0.85"/>
        <rect x="32" y="20" width="10" height="22" rx="4" fill="url(#rank-g2)" opacity="0.65"/>
        <rect x="20" y="13" width="8" height="8" rx="3" fill="white" opacity="0.25"/>
      </svg>
      <span class="dock-label">Stats</span>
    </a>

    <!-- Earn — Golden coin -->
    <a href="rewards.html" class="dock-item" id="dock-earn">
      <svg class="dock-icon-3d" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="earn-g1" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#FDE68A"/><stop offset="100%" stop-color="#F59E0B"/></linearGradient>
          <linearGradient id="earn-g2" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
        </defs>
        <circle cx="24" cy="24" r="18" fill="url(#earn-g1)" opacity="0.65"/>
        <circle cx="24" cy="24" r="13" fill="url(#earn-g2)" opacity="0.6"/>
        <ellipse cx="20" cy="18" rx="7" ry="5" fill="white" opacity="0.3"/>
        <text x="24" y="30" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="white" opacity="0.9">$</text>
      </svg>
      <span class="dock-label">Raffle</span>

    <!-- Me — Profile icon -->
    <a href="profile.html" class="dock-item" id="dock-me">
      <img class="dock-icon-3d" src="asset/profile.png" alt="Me">

    </a>

  </nav>

  <!-- Bottom-right: Status -->
  <footer class="status-monitor" aria-label="System status">
    <span class="status-dot"></span>OPERATIONAL<br>
    NODE: Voyage_01 &nbsp;·&nbsp; 99.99% UPTIME
  </footer>

</body>
</html>
